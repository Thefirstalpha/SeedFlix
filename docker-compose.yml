services:
  seedflix:
    container_name: seedflix
    build:
      context: .
      dockerfile: Dockerfile
    image: seedflix:latest
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

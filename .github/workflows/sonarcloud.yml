name: SonarCloud

on:
  push:
    branches:
      - "master"
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Static Analysis
    if: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Show Sonar properties
        run: cat sonar-project.properties

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dproject.settings=sonar-project.properties
            -Dsonar.verbose=true
            -Dsonar.exclusions=dist/**,node_modules/**,data/**,server/data/**,public/**,docker/**,guidelines/**,.github/**,**/*.d.ts,src/app/i18n/locales/**,**/src/app/i18n/locales/**,**/src/app/i18n/locales/**/*,**/locales/en.ts,**/locales/fr.ts
            -Dsonar.coverage.exclusions=src/main.tsx,src/vite-env.d.ts,server/index.js,src/app/i18n/locales/**,**/src/app/i18n/locales/**,**/src/app/i18n/locales/**/*,**/locales/en.ts,**/locales/fr.ts
            -Dsonar.cpd.exclusions=src/app/i18n/locales/**,**/src/app/i18n/locales/**,**/src/app/i18n/locales/**/*,**/locales/en.ts,**/locales/fr.ts